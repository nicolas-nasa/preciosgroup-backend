name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify files structure
        run: |
          echo "=== Checking repository structure ==="
          ls -la src/
          echo ""
          echo "=== Checking logs directory ==="
          ls -la src/logs/
          echo ""
          echo "=== Checking logs enums ==="
          ls -la src/logs/enums/
          echo ""
          echo "=== File: logs.module.ts ==="
          head -5 src/logs/logs.module.ts
          echo ""
          echo "=== File: action.enum.ts ==="
          head -5 src/logs/enums/action.enum.ts

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup pnpm store
        id: pnpm-cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build application
        run: |
          pnpm install
          echo ""
          echo "=== Verifying dependencies installation ==="
          test -d node_modules && echo "✓ node_modules directory exists" || echo "✗ node_modules directory missing"
          test -f pnpm-lock.yaml && echo "✓ pnpm-lock.yaml exists" || echo "✗ pnpm-lock.yaml missing"
          echo ""
          echo "=== Verifying source files before build ==="
          test -f src/logs/logs.module.ts && echo "✓ src/logs/logs.module.ts exists" || echo "✗ src/logs/logs.module.ts missing"
          test -f src/logs/logs.service.ts && echo "✓ src/logs/logs.service.ts exists" || echo "✗ src/logs/logs.service.ts missing"
          test -f src/logs/enums/action.enum.ts && echo "✓ src/logs/enums/action.enum.ts exists" || echo "✗ src/logs/enums/action.enum.ts missing"
          echo ""
          echo "=== Running build ==="
          pnpm build

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== Docker Build Configuration ==="
          echo "ECR_REGISTRY: $ECR_REGISTRY"
          echo "ECR_REPOSITORY: $ECR_REPOSITORY"
          echo "IMAGE_TAG: $IMAGE_TAG"
          echo ""
          echo "=== Building Docker image ==="
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo ""
          echo "=== Verifying image build ==="
          docker images | grep $ECR_REPOSITORY

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== Pushing image with tag: $IMAGE_TAG ==="
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo ""
          echo "=== Pushing image with tag: latest ==="
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo ""
          echo "=== Verifying images in ECR ==="
          aws ecr describe-images --repository-name $ECR_REPOSITORY --region ${{ env.AWS_REGION }} || echo "Unable to list ECR images"

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' > task-definition-from-aws.json

      - name: Register task definition from repository
        run: |
          echo "=== Registering task definition from repository ==="
          aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --region ${{ env.AWS_REGION }}
          echo ""
          echo "✓ Task definition registered successfully"

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-from-aws.json
          container-name: ${{ env.ECR_REPOSITORY }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          environment-variables: |
            PORT=${{ secrets.PORT }}
            MODE=${{ secrets.MODE }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            DATABASE_PORT=${{ secrets.DATABASE_PORT }}
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_DATABASE=${{ secrets.DATABASE_DATABASE }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DATABASE_TYPE=${{ secrets.DATABASE_TYPE }}

      - name: Verify task definition
        run: |
          echo "=== Updated Task Definition ==="
          cat ${{ steps.task-def.outputs.task-definition }}
          echo ""
          echo "=== Task Definition File Path ==="
          echo "File: ${{ steps.task-def.outputs.task-definition }}"

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to ECS completed successfully!"
          else
            echo "❌ Deployment to ECS failed!"
          fi
